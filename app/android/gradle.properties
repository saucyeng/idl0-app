org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Only cross-compile the Rust engine for arm64 on debug builds — all our dev
# devices are arm64 and skipping x86/x86_64 cuts debug build time. Remove
# this (or add "x86_64") if you need to run a debug build on an x86 emulator.
cargokitDebugAbis=arm64-v8a
