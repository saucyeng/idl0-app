name: flutter
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      # chart_workspace_test loads the native bridge, which the test harness
      # does not build/load — excluded here (it is exercised in the running app).
      - run: flutter test $(find test -name '*_test.dart' ! -name 'chart_workspace_test.dart')
